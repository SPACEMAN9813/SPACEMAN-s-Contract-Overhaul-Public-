CONTRACT_TYPE
{
    name = EveOrbiter
    group = SPACEMAN'sContractOverhaul

    title = Eve Orbital Mission
    agent = Kerbal Rocketry
    sortKey = 811

    synopsis = Launch an uncrewed probe and enter a stable orbit around Eve.
    notes = So turns out that purple dot has a dense cloud layer, but to study it we need to get into orbit.
    description = Send an uncrewed probe from Kerbin to Eve and place it into a stable orbit.
    completedMessage = Outstanding! Your probe has successfully entered orbit around Eve.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Eve

    rewardScience = 4
    rewardReputation = 35
    rewardFunds = 220000

    failureFunds = -60000
    failureReputation = -25

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedEveFlyby
        type = CompleteContract
        contractType = EveFlyby
    }

    PARAMETER
    {
        name = EveOrbiterMission
        type = VesselParameterGroup
        title = Complete a Eve orbital mission
        define = EveOrbiterMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = OrbitDuna
            type = Orbit
            targetBody = Duna
            minPeA = 123000
            maxPeA = 3025000
            minInclination = 0
            maxInclination = 180
            hideChildren = true
        }

        PARAMETER
        {
            name = MaintainOrbit
            type = Duration
            duration = 3d
            preWaitText = Holding stable Eve orbit...
            waitingText = Maintaining Eve orbit...
            completionText = Stable orbit maintained.
        }
    }
}