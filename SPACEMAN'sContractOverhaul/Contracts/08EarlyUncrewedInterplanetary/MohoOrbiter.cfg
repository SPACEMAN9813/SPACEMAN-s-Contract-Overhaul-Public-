CONTRACT_TYPE
{
    name = MohoOrbiter
    group = SPACEMAN'sContractOverhaul

    title = Moho Orbital Mission
    agent = Kerbal Rocketry
    sortKey = 819

    synopsis = Launch an uncrewed probe and enter a stable orbit around Moho.
    notes = So turns out that Moho has some cool features, but to study them we need to get into orbit.
    description = Send an uncrewed probe from Kerbin to Moho and place it into a stable orbit.
    completedMessage = Outstanding! Your probe has successfully entered orbit around Moho.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Moho

    rewardScience = 7
    rewardReputation = 35
    rewardFunds = 220000

    failureFunds = -60000
    failureReputation = -25

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedMohoFlyby
        type = CompleteContract
        contractType = MohoFlyby
    }

    PARAMETER
    {
        name = MohoOrbiterMission
        type = VesselParameterGroup
        title = Complete a Moho orbital mission
        define = MohoOrbiterMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = OrbitMoho
            type = Orbit
            targetBody = Moho
            minPeA = 266500
            maxPeA = 1111000
            minInclination = 0
            maxInclination = 180
            hideChildren = true
        }

        PARAMETER
        {
            name = MaintainOrbit
            type = Duration
            duration = 3d
            preWaitText = Holding stable Moho orbit...
            waitingText = Maintaining Moho orbit...
            completionText = Stable orbit maintained.
        }
    }
}