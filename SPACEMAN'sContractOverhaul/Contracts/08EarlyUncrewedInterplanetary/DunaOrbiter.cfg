CONTRACT_TYPE
{
    name = DunaOrbiter
    group = SPACEMAN'sContractOverhaul

    title = Duna Orbital Mission
    agent = Kerbal Rocketry
    sortKey = 810

    synopsis = Launch an uncrewed probe and enter a stable orbit around Duna.
    notes = So turns out that red dot has some very interesting features, but to study them we need to get into orbit.
    description = Send an uncrewed probe from Kerbin to Duna and place it into a stable orbit.
    completedMessage = Outstanding! Your probe has successfully entered orbit around Duna.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Duna

    rewardScience = 4
    rewardReputation = 35
    rewardFunds = 220000

    failureFunds = -60000
    failureReputation = -25

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedDunaFlyby
        type = CompleteContract
        contractType = DunaFlyby
    }

    PARAMETER
    {
        name = DunaOrbiterMission
        type = VesselParameterGroup
        title = Complete a Duna orbital mission
        define = DunaOrbiterMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = OrbitDuna
            type = Orbit
            targetBody = Duna
            minPeA = 50000
            maxPeA = 300000
            minInclination = 0
            maxInclination = 180
            hideChildren = true
        }

        PARAMETER
        {
            name = MaintainOrbit
            type = Duration
            duration = 3d
            preWaitText = Holding stable Duna orbit...
            waitingText = Maintaining Duna orbit...
            completionText = Stable orbit maintained.
        }
    }
}