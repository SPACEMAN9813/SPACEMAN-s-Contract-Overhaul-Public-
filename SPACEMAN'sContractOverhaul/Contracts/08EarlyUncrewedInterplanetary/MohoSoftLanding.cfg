CONTRACT_TYPE
{
    name = MohoSoftLanding
    group = SPACEMAN'sContractOverhaul

    title = Moho Soft Landing
    agent = Kerbal Rocketry
    sortKey = 788

    synopsis = Perform a controlled, uncrewed soft landing on Moho.
    notes = Orbiting Moho was only the beginning. Now we attempt a powered descent and touch down safely on the brown surface.
    description = Launch an uncrewed probe from Kerbin and perform a soft landing on Moho. Touch down intact and transmit scientific data from the surface to complete the mission.
    completedMessage = Success! Your probe has safely landed on Moho and transmitted surface data.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Moho

    rewardScience = 10
    rewardReputation = 45
    rewardFunds = 350000

    failureFunds = -90000
    failureReputation = -30

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedMohoOrbit
        type = CompleteContract
        contractType = MohoOrbiter
    }

    PARAMETER
    {
        name = MohoLandingMission
        type = VesselParameterGroup
        title = Complete a Moho landing mission
        define = MohoLandingMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = LandOnMoho
            type = ReachState
            title = Land on Moho
            targetBody = Moho
            situation = LANDED
            disableOnStateChange = true
            hideChildren = true
        }

        PARAMETER
        {
            name = TransmitData
            type = CollectScience
            recoveryMethod = TRANSMIT
            targetBody = Moho
            situation = SrfLanded
            title = Transmit any science from Moho's surface
        }
    }
}