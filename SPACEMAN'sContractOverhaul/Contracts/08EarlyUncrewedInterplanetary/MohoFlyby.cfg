CONTRACT_TYPE
{
    name = MohoFlyby
    group = SPACEMAN'sContractOverhaul

    title = Moho Flyby
    agent = Kerbal Rocketry
    sortKey = 894

    synopsis = Send an uncrewed vessel past Moho without returning to Kerbin.
    notes = We can clearly visit other bodies beyond Kerbin, but how far can we go? Try aiming for the little brown dot in the sky
    description = Launch a probe from Kerbin and perform a flyby of Moho to gather valuable planetary data.
    completedMessage = Excellent! Your vessel successfully performed an Moho flyby.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = HomeWorld()

    rewardScience = 5
    rewardReputation = 25
    rewardFunds = 120000

    failureFunds = -30000
    failureReputation = -20

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedEveFlyby
        type = CompleteContract
        contractType = EveFlyby
    }

    PARAMETER
    {
        name = MohoFlybyMission
        type = VesselParameterGroup
        title = Complete an Moho flyby
        define = MohoFlybyMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = FlybyMoho
            type = ReachState
            situation = ESCAPING
            targetBody = Moho
            title = Achieve a flyby of Moho
            disableOnStateChange = true
            hideChildren = true
        }
    }
}