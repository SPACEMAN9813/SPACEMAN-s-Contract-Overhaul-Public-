CONTRACT_TYPE
{
    name = EveSoftLanding
    group = SPACEMAN'sContractOverhaul

    title = Eve Soft Landing
    agent = Kerbal Rocketry
    sortKey = 888

    synopsis = Perform a controlled, uncrewed soft landing on Eve.
    notes = Orbiting Eve was only the beginning. Now we attempt a powered descent through its thick atmosphere and touch down safely on the surface.
    description = Launch an uncrewed probe from Kerbin and perform a soft landing on Eve. Touch down intact and transmit scientific data from the surface to complete the mission.
    completedMessage = Success! Your probe has safely landed on Eve and transmitted surface data.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Eve

    rewardScience = 8
    rewardReputation = 45
    rewardFunds = 350000

    failureFunds = -90000
    failureReputation = -30

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedEveOrbit
        type = CompleteContract
        contractType = EveOrbiter
    }

    PARAMETER
    {
        name = EveLandingMission
        type = VesselParameterGroup
        title = Complete a Eve landing mission
        define = EveLandingMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = LandOnEve
            type = ReachState
            title = Land on Eve
            targetBody = Eve
            situation = LANDED
            disableOnStateChange = true
            hideChildren = true
        }

        PARAMETER
        {
            name = TransmitData
            type = CollectScience
            recoveryMethod = TRANSMIT
            targetBody = Eve
            situation = SrfLanded
            title = Transmit any science from Eve's surface
        }
    }
}