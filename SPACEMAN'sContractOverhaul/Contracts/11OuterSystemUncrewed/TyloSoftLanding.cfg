CONTRACT_TYPE
{
    name = TyloSoftLanding
    group = SPACEMAN'sContractOverhaul

    title = Tylo Soft Landing
    agent = Kerbal Rocketry
    sortKey = 9000

    synopsis = Perform a controlled, uncrewed soft landing on Tylo.
    notes = A flyby of Tylo is interesting, but to really understand the moon we need to get down to the surface. Land a probe on Tylo and transmit data back to Kerbin.
    description = Launch an uncrewed probe from Kerbin and perform a soft landing on Tylo. Touch down intact and transmit scientific data from the surface to complete the mission.
    completedMessage = Success! Your probe has safely landed on Tylo and transmitted surface data.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Tylo

    rewardScience = 20
    rewardReputation = 45
    rewardFunds = 350000

    failureFunds = -90000
    failureReputation = -30

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedTyloFlyby
        type = CompleteContract
        contractType = TyloFlyby
    }

    PARAMETER
    {
        name = TyloLandingMission
        type = VesselParameterGroup
        title = Complete a Tylo landing mission
        define = TyloLandingMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = LandOnTylo
            type = ReachState
            title = Land on Tylo
            targetBody = Tylo
            situation = LANDED
            disableOnStateChange = true
            hideChildren = true
        }

        PARAMETER
        {
            name = TransmitData
            type = CollectScience
            recoveryMethod = TRANSMIT
            targetBody = Tylo
            situation = SrfLanded
            title = Transmit any science from Tylo's surface
        }
    }
}