CONTRACT_TYPE
{
    name = TyloFlyby
    group = SPACEMAN'sContractOverhaul

    title = Tylo Flyby
    agent = Kerbal Rocketry
    sortKey = 8040

    synopsis = Send an uncrewed vessel past Tylo without returning to Kerbin.
    notes = We have now shown we can go to Jool, but Jool has many moons of intrest. Tylo is one of them, and we want to know more about it.
    description = Launch a probe from Kerbin and perform a flyby of Tylo to gather interplanetary moon science.
    completedMessage = Outstanding! Your vessel successfully performed a Tylo flyby.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = HomeWorld()

    rewardScience = 12
    rewardReputation = 30
    rewardFunds = 150000

    failureFunds = -30000
    failureReputation = -20

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedJoolFlyby
        type = CompleteContract
        contractType = JoolFlyby
    }

    PARAMETER
    {
        name = TyloFlybyMission
        type = VesselParameterGroup
        title = Complete a Tylo flyby
        define = TyloFlybyMission
        define = TyloFlybyMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = FlybyTylo
            type = ReachState
            situation = ESCAPING
            targetBody = Tylo
            title = Achieve a flyby of Tylo
            disableOnStateChange = true
            hideChildren = true
        }
    }
}