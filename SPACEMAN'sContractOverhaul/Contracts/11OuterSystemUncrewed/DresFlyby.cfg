CONTRACT_TYPE
{
    name = DresFlyby
    group = SPACEMAN'sContractOverhaul

    title = Dres Flyby
    agent = Kerbal Rocketry
    sortKey = 8500

    synopsis = Send an uncrewed vessel past Dres without returning to Kerbin.
    notes = We can clearly visit other bodies in the inner system, but can we go into the asteroid belt? Try aiming for the tiny Grey dot in the sky
    description = Launch a probe from Kerbin and perform a flyby of Dres to gather interplanetary science.
    completedMessage = Outstanding! Your vessel successfully performed a Dres flyby.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = HomeWorld()

    rewardScience = 7
    rewardReputation = 30
    rewardFunds = 150000

    failureFunds = -30000
    failureReputation = -20

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedDunaOrbit
        type = CompleteContract
        contractType = DunaOrbiter
    }

    PARAMETER
    {
        name = DresFlybyMission
        type = VesselParameterGroup
        title = Complete a Dres flyby
        define = DresFlybyMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = FlybyDres
            type = ReachState
            situation = ESCAPING
            targetBody = Dres
            title = Achieve a flyby of Dres
            disableOnStateChange = true
            hideChildren = true
        }
    }
}