CONTRACT_TYPE
{
    name = VallFlyby
    group = SPACEMAN'sContractOverhaul

    title = Vall Flyby
    agent = Kerbal Rocketry
    sortKey = 8030

    synopsis = Send an uncrewed vessel past Vall without returning to Kerbin.
    notes = We have now shown we can go to Jool, but Jool has many moons of intrest. Vall is one of them, and we want to know more about it.
    description = Launch a probe from Kerbin and perform a flyby of Vall to gather interplanetary moon science.
    completedMessage = Outstanding! Your vessel successfully performed a Vall flyby.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = HomeWorld()

    rewardScience = 12
    rewardReputation = 30
    rewardFunds = 150000

    failureFunds = -30000
    failureReputation = -20

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedJoolFlyby
        type = CompleteContract
        contractType = JoolFlyby
    }

    PARAMETER
    {
        name = VallFlybyMission
        type = VesselParameterGroup
        title = Complete a Vall flyby
        define = VallFlybyMission
        define = VallFlybyMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = FlybyVall
            type = ReachState
            situation = ESCAPING
            targetBody = Vall
            title = Achieve a flyby of Vall
            disableOnStateChange = true
            hideChildren = true
        }
    }
}