CONTRACT_TYPE
{
    name = JoolOrbiter
    group = SPACEMAN'sContractOverhaul

    title = Jool Orbital Mission
    agent = Kerbal Rocketry
    sortKey = 8010

    synopsis = Launch an uncrewed probe and enter a stable orbit around Jool.
    notes = So turns out that gas giant has some very interesting features, but to study them we need to get into orbit.
    description = Send an uncrewed probe from Kerbin to Jool and place it into a stable orbit.
    completedMessage = Outstanding! Your probe has successfully entered orbit around Jool.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Jool

    rewardScience = 17
    rewardReputation = 35
    rewardFunds = 850000

    failureFunds = -60000
    failureReputation = -25

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedJoolFlyby
        type = CompleteContract
        contractType = JoolFlyby
    }

    PARAMETER
    {
        name = JoolOrbiterMission
        type = VesselParameterGroup
        title = Complete a Jool orbital mission
        define = JoolOrbiterMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = OrbitJool
            type = Orbit
            targetBody = Jool
            minPeA = 13700000
            maxPeA = 160793000
            minInclination = 0
            maxInclination = 180
            hideChildren = true
        }

        PARAMETER
        {
            name = MaintainOrbit
            type = Duration
            duration = 3d
            preWaitText = Holding stable Jool orbit...
            waitingText = Maintaining Jool orbit...
            completionText = Stable orbit maintained.
        }
    }
}