CONTRACT_TYPE
{
    name = LaytheFlyby
    group = SPACEMAN'sContractOverhaul

    title = Laythe Flyby
    agent = Kerbal Rocketry
    sortKey = 8020

    synopsis = Send an uncrewed vessel past Laythe without returning to Kerbin.
    notes = We have now shown we can go to Jool, but Jool has many moons of intrest. Laythe is the most Home-like of them, and we want to know more about it.
    description = Launch a probe from Kerbin and perform a flyby of Laythe to gather interplanetary moon science.
    completedMessage = Outstanding! Your vessel successfully performed a Laythe flyby.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = HomeWorld()

    rewardScience = 12
    rewardReputation = 30
    rewardFunds = 150000

    failureFunds = -30000
    failureReputation = -20

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedJoolFlyby
        type = CompleteContract
        contractType = JoolFlyby
    }

    PARAMETER
    {
        name = LaytheFlybyMission
        type = VesselParameterGroup
        title = Complete a Laythe flyby
        define = LaytheFlybyMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = FlybyLaythe
            type = ReachState
            situation = ESCAPING
            targetBody = Laythe
            title = Achieve a flyby of Laythe
            disableOnStateChange = true
            hideChildren = true
        }
    }
}