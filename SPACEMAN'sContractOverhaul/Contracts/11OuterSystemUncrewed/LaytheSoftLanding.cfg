CONTRACT_TYPE
{
    name = LaytheSoftLanding
    group = SPACEMAN'sContractOverhaul

    title = Laythe Soft Landing
    agent = Kerbal Rocketry
    sortKey = 8230

    synopsis = Perform a controlled, uncrewed soft landing on Laythe.
    notes = A flyby of Laythe is interesting, but to really understand the moon we need to get down to the surface. Land a probe on Laythe and transmit data back to Kerbin.
    description = Launch an uncrewed probe from Kerbin and perform a soft landing on Laythe. Touch down intact and transmit scientific data from the surface to complete the mission.
    completedMessage = Success! Your probe has safely landed on Laythe and transmitted surface data.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Laythe

    rewardScience = 4
    rewardReputation = 35
    rewardFunds = 250000

    failureFunds = -90000
    failureReputation = -30

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedLaytheFlyby
        type = CompleteContract
        contractType = LaytheFlyby
    }

    PARAMETER
    {
        name = LaytheLandingMission
        type = VesselParameterGroup
        title = Complete a Laythe landing mission
        define = LaytheLandingMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = LandOnIke
            type = ReachState
            title = Land on Laythe
            targetBody = Laythe
            situation = LANDED
            disableOnStateChange = true
            hideChildren = true
        }

        PARAMETER
        {
            name = TransmitData
            type = CollectScience
            recoveryMethod = TRANSMIT
            targetBody = Laythe
            situation = SrfLanded
            title = Transmit any science from Laythe's surface
        }
    }
}