CONTRACT_TYPE
{
    name = JoolFlyby
    group = SPACEMAN'sContractOverhaul

    title = Jool Flyby
    agent = Kerbal Rocketry
    sortKey = 8000

    synopsis = Send an uncrewed vessel past Jool without returning to Kerbin.
    notes = We can clearly visit other bodies in the inner system, but can we go further? Try aiming for the Green dot in the sky
    description = Launch a probe from Kerbin and perform a flyby of Jool to gather interplanetary science.
    completedMessage = Outstanding! Your vessel successfully performed a Jool flyby.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = HomeWorld()

    rewardScience = 15
    rewardReputation = 50
    rewardFunds = 850000

    failureFunds = -30000
    failureReputation = -20

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedDunaOrbit
        type = CompleteContract
        contractType = DunaOrbiter
    }

    PARAMETER
    {
        name = JoolFlybyMission
        type = VesselParameterGroup
        title = Complete a Jool flyby
        define = JoolFlybyMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = FlybyJool
            type = ReachState
            situation = ESCAPING
            targetBody = Jool
            title = Achieve a flyby of Jool
            disableOnStateChange = true
            hideChildren = true
        }
    }
}