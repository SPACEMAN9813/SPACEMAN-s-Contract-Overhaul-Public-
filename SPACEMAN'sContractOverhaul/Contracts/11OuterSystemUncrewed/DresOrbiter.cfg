CONTRACT_TYPE
{
    name = DresOrbiter
    group = SPACEMAN'sContractOverhaul

    title = Dres Orbital Mission
    agent = Kerbal Rocketry
    sortKey = 8100

    synopsis = Launch an uncrewed probe and enter a stable orbit around Dres.
    notes = So turns out that Grey dot has some very interesting features, but to study them we need to get into orbit.
    description = Send an uncrewed probe from Kerbin to Dres and place it into a stable orbit.
    completedMessage = Outstanding! Your probe has successfully entered orbit around Dres.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Dres

    rewardScience = 9
    rewardReputation = 35
    rewardFunds = 220000

    failureFunds = -60000
    failureReputation = -25

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedDresFlyby
        type = CompleteContract
        contractType = DresFlyby
    }

    PARAMETER
    {
        name = DresOrbiterMission
        type = VesselParameterGroup
        title = Complete a Dres orbital mission
        define = DresOrbiterMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = OrbitDres
            type = Orbit
            targetBody = Dres
            minPeA = 137000
            maxPeA = 660000
            minInclination = 0
            maxInclination = 180
            hideChildren = true
        }

        PARAMETER
        {
            name = MaintainOrbit
            type = Duration
            duration = 3d
            preWaitText = Holding stable Dres orbit...
            waitingText = Maintaining Dres orbit...
            completionText = Stable orbit maintained.
        }
    }
}