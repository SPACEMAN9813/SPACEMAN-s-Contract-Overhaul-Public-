CONTRACT_TYPE
{
    name = KerbinStationCrewSwap
    group = SPACEMAN'sContractOverhaul

    title = Crew Rotation for Space Station
    agent = Kerbal Rocketry
    sortKey = 1444

    synopsis = Send a new crew to Kerbin Station and keep them aboard for 250 days.
    notes = With the long-duration missions complete, it's time to begin extended habitation even more...
    description = Launch a new crewed vessel, rendezvous and dock with Kerbin Station, keep at least one Kerbal aboard for 250 days, then return them safely to Kerbin.
    completedMessage = Fantastic work! Your crew successfully completed their 250-day mission aboard the station.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 100

    cancellable = true
    declinable = true

    targetBody = HomeWorld()

    rewardScience = 0
    rewardReputation = 50
    rewardFunds = 300000

    failureFunds = -30000
    failureReputation = -25

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedStation100Day
        type = CompleteContract
        contractType = KerbinStationCrewStay100
    }

    PARAMETER
    {
        name = StationCrewMission100
        type = VesselParameterGroup
        title = Complete a 250-day station crew rotation
        define = StationCrewMission250

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new crew transport vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Crewed
            type = HasCrew
            title = Carry at least five Kerbals
            minCrew = 5
            hideChildren = true
        }

        PARAMETER
        {
            name = Rendezvous
            type = Rendezvous
            title = Rendezvous with the Kerbin Space Station
            targetVessel = StationCore
            hideChildren = true
        }

        PARAMETER
        {
            name = Dock
            type = Docking
            title = Dock with the Kerbin Space Station
            targetVessel = StationCore
            hideChildren = true
        }

        PARAMETER
        {
            name = StayDuration
            type = Duration
            duration = 250d
            title = Keep crew aboard Kerbin Station for 250 days
            hideChildren = true
        }

        PARAMETER
        {
            name = ReturnCrew
            type = RecoverKerbal
            title = Return the crew safely to Kerbin
            hideChildren = true
        }
    }
}