CONTRACT_TYPE
{
    name = EelooOrbiter
    group = SPACEMAN'sContractOverhaul

    title = Eeloo Orbital Mission
    agent = Kerbal Rocketry
    sortKey = 10000

    synopsis = Launch an uncrewed probe and enter a stable orbit around Eeloo.
    notes = So turns out that White dot has some very interesting features, but to study them we need to get into orbit.
    description = Send an uncrewed probe from Kerbin to Eeloo and place it into a stable orbit.
    completedMessage = Outstanding! Your probe has successfully entered orbit around Eeloo.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Eeloo

    rewardScience = 20
    rewardReputation = 35
    rewardFunds = 220000

    failureFunds = -60000
    failureReputation = -25

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedEelooFlyby
        type = CompleteContract
        contractType = EelooFlyby
    }

    PARAMETER
    {
        name = EelooOrbiterMission
        type = VesselParameterGroup
        title = Complete a Eeloo orbital mission
        define = EelooOrbiterMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = OrbitEeloo
            type = Orbit
            targetBody = Eeloo
            minPeA = 219000
            maxPeA = 5349000
            minInclination = 0
            maxInclination = 180
            hideChildren = true
        }

        PARAMETER
        {
            name = MaintainOrbit
            type = Duration
            duration = 3d
            preWaitText = Holding stable Dres orbit...
            waitingText = Maintaining Dres orbit...
            completionText = Stable orbit maintained.
        }
    }
}