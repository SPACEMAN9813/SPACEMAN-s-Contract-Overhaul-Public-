CONTRACT_TYPE
{
    name = CrewedEelooLanding
    group = SPACEMAN'sContractOverhaul

    title = Crewed Eeloo Landing
    agent = Kerbal Rocketry
    sortKey = 1008

    synopsis = Land Kerbals on Eeloo, perform surface operations, and return them safely.
    notes = After mastering other Eeloo operations, your agency is ready to attempt an interplanetary crewed landing.
    description = Launch a new crewed vessel to Eeloo, land safely, plant a flag, collect a surface sample, and return your crew safely to Kerbin.
    completedMessage = Your crew has landed on Eeloo and returned home safely.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Eeloo

    rewardScience = 30
    rewardReputation = 120
    rewardFunds = 600000

    failureFunds = -200000
    failureReputation = -80

    prestige = Exceptional

    REQUIREMENT
    {
        name = CompletedCrewedLaytheLanding
        type = CompleteContract
        contractType = CrewedLaytheLanding
    }

    REQUIREMENT
    {
        name = CompletedEelooOrbiter
        type = CompleteContract
        contractType = EelooOrbiter
    }
    


    PARAMETER
    {
        name = Crewed
        type = HasCrew
        minCrew = 1
        title = Launch a crewed interplanetary vessel
    }

    PARAMETER
    {
        name = LandOnEeloo
        type = ReachState
        title = Land on Eeloo
        targetBody = Eeloo
        situation = LANDED
        disableOnStateChange = true
        hideChildren = true
    }

    PARAMETER
    {
        name = PlantFlag
        type = PlantFlag
        targetBody = Eeloo
        title = Plant a flag on Eeloo's surface
    }

    PARAMETER
    {
        name = CollectSurfaceSample
        type = CollectScience
        targetBody = Eeloo
        situation = SrfLanded
        experiment = surfaceSample
        title = Collect a surface sample from Eeloo
    }

    PARAMETER
    {
        name = ReturnHome
        type = ReturnHome
        title = Safely return the crew to Kerbin
    }
}