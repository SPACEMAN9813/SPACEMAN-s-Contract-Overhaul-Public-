CONTRACT_TYPE
{
    name = EelooFlyby
    group = SPACEMAN'sContractOverhaul

    title = Eeloo Flyby
    agent = Kerbal Rocketry
    sortKey = 10989

    synopsis = Send an uncrewed vessel past Eeloo without returning to Kerbin.
    notes = We have now shown we can go to Jool, but there is one object beyond Jool. Eeloo, and we want to know more about it.
    description = Launch a probe from Kerbin and perform a flyby of Eeloo to gather interplanetary science.
    completedMessage = Outstanding! Your vessel successfully performed a Eeloo flyby.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = HomeWorld()

    rewardScience = 28
    rewardReputation = 30
    rewardFunds = 150000

    failureFunds = -30000
    failureReputation = -20

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedJoolFlyby
        type = CompleteContract
        contractType = JoolFlyby
    }

    PARAMETER
    {
        name = EelooFlybyMission
        type = VesselParameterGroup
        title = Complete a Eeloo flyby
        define = EelooFlybyMission
        define = EelooFlybyMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = FlybyEeloo
            type = ReachState
            situation = ESCAPING
            targetBody = Eeloo
            title = Achieve a flyby of Eeloo
            disableOnStateChange = true
            hideChildren = true
        }
    }
}