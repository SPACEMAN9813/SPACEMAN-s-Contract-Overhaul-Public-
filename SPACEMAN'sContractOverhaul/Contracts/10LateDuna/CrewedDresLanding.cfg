CONTRACT_TYPE
{
    name = CrewedDresLanding
    group = SPACEMAN'sContractOverhaul

    title = Crewed Dres Landing
    agent = Kerbal Rocketry
    sortKey = 2378

    synopsis = Land Kerbals on Dres, perform surface operations, and return them safely.
    notes = With Duna orbital missions completed , your agency is ready for a crewed landing on Dres.
    description = Launch a new crewed vessel to Dres, land safely, plant a flag, collect a surface sample, and return your crew safely to Kerbin.
    completedMessage = Your crew has landed on Dres and returned home safely.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Ike

    rewardScience = 12
    rewardReputation = 140
    rewardFunds = 750000

    failureFunds = -250000
    failureReputation = -90

    prestige = Exceptional

    REQUIREMENT
    {
        name = CompletedCrewedDunaOrbit
        type = CompleteContract
        contractType = CrewedDunaOrbiter
    }

    REQUIREMENT
    {
        name = CompletedDresOrbiter
        type = CompleteContract
        contractType = DresOrbiter
    }

    PARAMETER
    {
        name = Crewed
        type = HasCrew
        minCrew = 1
        title = Launch a crewed interplanetary vessel
    }

    PARAMETER
    {
        name = LandOnDres
        type = ReachState
        title = Land on Dres
        targetBody = Dres
        situation = LANDED
        disableOnStateChange = true
        hideChildren = true
    }

    PARAMETER
    {
        name = PlantFlag
        type = PlantFlag
        targetBody = Dres
        title = Plant a flag on Dres's surface
    }

    PARAMETER
    {
        name = CollectSurfaceSample
        type = CollectScience
        targetBody = Dres
        situation = SrfLanded
        experiment = surfaceSample
        title = Collect a surface sample from Dres
    }

    PARAMETER
    {
        name = ReturnHome
        type = ReturnHome
        title = Safely return the crew to Kerbin
    }
}