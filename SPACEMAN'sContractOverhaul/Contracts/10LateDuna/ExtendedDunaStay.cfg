CONTRACT_TYPE
{
    name = ExtendedDunaStay
    group = SPACEMAN'sContractOverhaul

    title = Extended Duna Stay
    agent = Kerbal Rocketry
    sortKey = 2400

    synopsis = Keep a crewed vessel landed on Duna for at least 150 days.
    notes = After successful landings on both Ike and Duna, mission control is ready to push the limits of long-duration interplanetary surface operations.
    description = Land a crewed vessel on Duna and maintain a surface presence for at least 150 days. Conduct extended operations and return the crew safely to Kerbin.
    completedMessage = The 150-day Duna surface mission was a success! Long-term interplanetary habitation is now within reach.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Duna

    rewardScience = 15
    rewardReputation = 200
    rewardFunds = 1200000

    failureFunds = -400000
    failureReputation = -120

    prestige = Exceptional

    REQUIREMENT
    {
        name = CompletedCrewedIkeLanding
        type = CompleteContract
        contractType = CrewedIkeLanding
    }

    REQUIREMENT
    {
        name = CompletedCrewedDunaLanding
        type = CompleteContract
        contractType = CrewedDunaLanding
    }

    PARAMETER
    {
        name = Crewed
        type = HasCrew
        minCrew = 1
        title = Land a crewed interplanetary vessel on Duna
    }

    PARAMETER
    {
        name = LandOnDuna
        type = ReachState
        title = Land on Duna
        targetBody = Duna
        situation = LANDED
        disableOnStateChange = true
        hideChildren = true
    }

    PARAMETER
    {
        name = StayDuration
        type = Duration
        duration = 150d
        preWaitText = Beginning extended Duna surface mission...
        waitingText = Maintaining long-term surface presence on Duna...
        completionText = Surface stay completed.
        title = Remain landed on Duna for at least 150 days
    }

    PARAMETER
    {
        name = ReturnHome
        type = ReturnHome
        title = Safely return the crew to Kerbin
    }
}