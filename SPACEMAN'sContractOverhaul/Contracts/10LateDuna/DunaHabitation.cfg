CONTRACT_TYPE
{
    name = DunaHabitation
    group = SPACEMAN'sContractOverhaul

    title = Duna Habitation
    agent = Kerbal Rocketry
    sortKey = 2500

    synopsis = Maintain a crewed vessel on Duna for at least 255 days and conduct extended surface operations.
    notes = After proving long-duration missions on the planet, your agency is ready to attempt sustained habitation on Duna.
    description = Launch a crewed mission to Duna, land safely, maintain a stable surface presence for at least 255 days, perform scientific operations, and return the crew safely to Kerbin.
    completedMessage = Outstanding! Your crew has completed a 255-day surface mission on Duna, proving the feasibility of long-term interplanetary habitation.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Duna

    rewardScience = 10
    rewardReputation = 150
    rewardFunds = 900000

    failureFunds = -250000
    failureReputation = -75

    prestige = Exceptional

    REQUIREMENT
    {
        name = CompletedExtendedDunaStay
        type = CompleteContract
        contractType = ExtendedDunaStay
    }

    PARAMETER
    {
        name = Crewed
        type = HasCrew
        minCrew = 1
        title = Launch a crewed vessel to Duna
    }

    PARAMETER
    {
        name = LandOnDuna
        type = ReachState
        title = Land on Duna
        targetBody = Duna
        situation = LANDED
        disableOnStateChange = true
        hideChildren = true
    }

    PARAMETER
    {
        name = SurfaceStay
        type = Duration
        duration = 255d
        preWaitText = Beginning long-term Duna habitation...
        waitingText = Maintaining surface presence...
        completionText = 255-day surface stay completed.
        title = Remain landed on Duna for at least 255 days
    }

    PARAMETER
    {
        name = ConductSurfaceActivities
        type = CollectScience
        targetBody = Duna
        situation = SrfLanded
        title = Perform at least one surface science operation
    }

    PARAMETER
    {
        name = ReturnHome
        type = ReturnHome
        title = Safely return the crew to Kerbin
    }
}