CONTRACT_TYPE
{
    name = LaytheSettlement
    group = SPACEMAN'sContractOverhaul

    title = Extended Laythe Stay
    agent = Kerbal Rocketry
    sortKey = 9800

    synopsis = Keep a crewed vessel landed on Laythe for at least 1000 days.
    notes = After a successful Extended Laythe Stay, mission control is ready to push the limits of Settlement beyond home.
    description = Land a crewed vessel on Laythe and maintain a surface presence for at least 1000 days. Conduct extended operations and return the crew safely to Kerbin.
    completedMessage = The 1000-day Laythe surface mission was a success! Long-term interplanetary habitation is now within reach.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Laythe

    rewardScience = 60
    rewardReputation = 200
    rewardFunds = 1200000

    failureFunds = -400000
    failureReputation = -120

    prestige = Exceptional

    REQUIREMENT
    {
        name = CompletedExtendedLaytheStay
        type = CompleteContract
        contractType = ExtendedLaytheStay
    }


    PARAMETER
    {
        name = Crewed
        type = HasCrew
        minCrew = 12
        title = Land a crewed interplanetary vessel on Laythe
    }

    PARAMETER
    {
        name = LandOnLaythe
        type = ReachState
        title = Land on Laythe
        targetBody = Laythe
        situation = LANDED
        disableOnStateChange = true
        hideChildren = true
    }

    PARAMETER
    {
        name = StayDuration
        type = Duration
        duration = 1000d
        preWaitText = Beginning Settlement of Laythe...
        waitingText = Maintaining long-term surface presence on Laythe...
        completionText = Surface stay completed.
        title = Remain landed on Laythe for at least 1000 days
    }

    PARAMETER
    {
        name = ReturnHome
        type = ReturnHome
        title = Safely return the crew to Kerbin
    }
}