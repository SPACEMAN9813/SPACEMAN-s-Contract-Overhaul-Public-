CONTRACT_TYPE
{
    name = CrewedLaytheOrbiter
    group = SPACEMAN'sContractOverhaul

    title = Crewed Laythe Orbital Mission
    agent = Kerbal Rocketry
    sortKey = 830

    synopsis = Send Kerbals to orbit Laythe and safely return them home.
    notes = Uncrewed missions have paved the way. It is now time to send Kerbals to orbit the blue cloudy planet and bring them back safely... We hope...
    description = Launch a crewed spacecraft from Kerbin, place it into stable orbit around Laythe, maintain orbit for a short duration, and return the crew safely to Kerbin.
    completedMessage = Historic achievement! Your crew successfully orbited Laythe and returned safely to Kerbin.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Duna

    rewardScience = 27
    rewardReputation = 80
    rewardFunds = 750000

    failureFunds = -250000
    failureReputation = -60

    prestige = Exceptional

    REQUIREMENT
    {
        name = CompletedCrewedJoolOrbiter
        type = CompleteContract
        contractType = CrewedJoolOrbiter
    }

    REQUIREMENT
    {
        name = CompletedLaytheSoftLanding
        type = CompleteContract
        contractType = LaytheSoftLanding
    }

    PARAMETER
    {
        name = CrewedLaytheMission
        type = VesselParameterGroup
        title = Complete a crewed Laythe orbital mission
        define = CrewedLaytheMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new crewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = HasCrew
            type = HasCrew
            title = Have at least 1 Kerbal aboard
            minCrew = 1
            hideChildren = true
        }

        PARAMETER
        {
            name = OrbitLaythe
            type = Orbit
            targetBody = Laythe
            minPeA = 51000
            maxPeA = 1059000
            minInclination = 0
            maxInclination = 180
            hideChildren = true
            disableOnStateChange = true
        }

        PARAMETER
        {
            name = MaintainOrbit
            type = Duration
            duration = 50d
            preWaitText = Crew stabilizing orbit...
            waitingText = Conducting orbital operations around Laythe...
            completionText = Orbital objectives complete.
        }

        PARAMETER
        {
            name = ReturnHome
            type = ReturnHome
            title = Safely return the crew to Kerbin
        }
    }
}