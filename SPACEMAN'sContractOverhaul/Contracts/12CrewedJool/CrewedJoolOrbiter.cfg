CONTRACT_TYPE
{
    name = CrewedJoolOrbiter
    group = SPACEMAN'sContractOverhaul

    title = Crewed Jool Orbital Mission
    agent = Kerbal Rocketry
    sortKey = 8300

    synopsis = Send Kerbals to orbit Jool and safely return them home.
    notes = Uncrewed missions have paved the way. It is now time to send Kerbals to orbit Jool and bring them back safely... We hope...
    description = Launch a crewed spacecraft from Kerbin, place it into stable orbit around Jool, maintain orbit for a short duration, and return the crew safely to Kerbin.
    completedMessage = Historic achievement! Your crew successfully orbited Jool and returned safely to Kerbin.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Jool

    rewardScience = 25
    rewardReputation = 80
    rewardFunds = 750000

    failureFunds = -250000
    failureReputation = -60

    prestige = Exceptional

    REQUIREMENT
    {
        name = CompletedDunaHabitation
        type = CompleteContract
        contractType = DunaHabitation
    }

    REQUIREMENT
    {
        name = CompletedJoolOrbiter
        type = CompleteContract
        contractType = JoolOrbiter
    }


    PARAMETER
    {
        name = CrewedJoolMission
        type = VesselParameterGroup
        title = Complete a crewed Jool orbital mission
        define = CrewedJoolMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new crewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = HasCrew
            type = HasCrew
            title = Have at least 1 Kerbal aboard
            minCrew = 1
            hideChildren = true
        }

        PARAMETER
        {
            name = OrbitJool
            type = Orbit
            targetBody = Jool
            minPeA = 13700000
            maxPeA = 160793000
            minInclination = 0
            maxInclination = 180
            hideChildren = true
            disableOnStateChange = true
        }

        PARAMETER
        {
            name = MaintainOrbit
            type = Duration
            duration = 50d
            preWaitText = Crew stabilizing orbit...
            waitingText = Conducting orbital operations around Jool...
            completionText = Orbital objectives complete.
        }

        PARAMETER
        {
            name = ReturnHome
            type = ReturnHome
            title = Safely return the crew to Kerbin
        }
    }
}