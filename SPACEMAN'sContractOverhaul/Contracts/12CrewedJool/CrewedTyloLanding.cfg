CONTRACT_TYPE
{
    name = CrewedTyloLanding
    group = SPACEMAN'sContractOverhaul

    title = Crewed Tylo Landing
    agent = Kerbal Rocketry
    sortKey = 8900

    synopsis = Land Kerbals on Tylo, perform surface operations, and return them safely.
    notes = After mastering other Jool operations, your agency is ready to attempt an interplanetary crewed landing.
    description = Launch a new crewed vessel to Tylo, land safely, plant a flag, collect a surface sample, and return your crew safely to Kerbin.
    completedMessage = Your crew has landed on Tylo and returned home safely.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Tylo

    rewardScience = 30
    rewardReputation = 120
    rewardFunds = 600000

    failureFunds = -200000
    failureReputation = -80

    prestige = Exceptional

    REQUIREMENT
    {
        name = CompletedTyloSoftLanding
        type = CompleteContract
        contractType = TyloSoftLanding
    }

    REQUIREMENT
    {
        name = CompletedCrewedJoolOrbiter
        type = CompleteContract
        contractType = CrewedJoolOrbiter
    }


    PARAMETER
    {
        name = Crewed
        type = HasCrew
        minCrew = 1
        title = Launch a crewed interplanetary vessel
    }

    PARAMETER
    {
        name = LandOnTylo
        type = ReachState
        title = Land on Tylo
        targetBody = Tylo
        situation = LANDED
        disableOnStateChange = true
        hideChildren = true
    }

    PARAMETER
    {
        name = PlantFlag
        type = PlantFlag
        targetBody = Tylo
        title = Plant a flag on Tylo's surface
    }

    PARAMETER
    {
        name = CollectSurfaceSample
        type = CollectScience
        targetBody = Tylo
        situation = SrfLanded
        experiment = surfaceSample
        title = Collect a surface sample from Tylo
    }

    PARAMETER
    {
        name = ReturnHome
        type = ReturnHome
        title = Safely return the crew to Kerbin
    }
}