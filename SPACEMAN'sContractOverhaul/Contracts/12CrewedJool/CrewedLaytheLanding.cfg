CONTRACT_TYPE
{
    name = CrewedLaytheLanding
    group = SPACEMAN'sContractOverhaul

    title = Crewed Laythe Landing
    agent = Kerbal Rocketry
    sortKey = 8700

    synopsis = Land Kerbals on Laythe, perform surface operations, and return them safely.
    notes = After mastering other Jool operations, your agency is ready to attempt an interplanetary crewed landing.
    description = Launch a new crewed vessel to Laythe, land safely, plant a flag, collect a surface sample, and return your crew safely to Kerbin.
    completedMessage = Your crew has landed on Laythe and returned home safely.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Laythe

    rewardScience = 30
    rewardReputation = 120
    rewardFunds = 600000

    failureFunds = -200000
    failureReputation = -80

    prestige = Exceptional

    REQUIREMENT
    {
        name = CompletedCrewedLaytheOrbit
        type = CompleteContract
        contractType = CrewedLaytheOrbiter
    }

    REQUIREMENT
    {
        name = CompletedCrewedJoolOrbiter
        type = CompleteContract
        contractType = CrewedJoolOrbiter
    }


    PARAMETER
    {
        name = Crewed
        type = HasCrew
        minCrew = 1
        title = Launch a crewed interplanetary vessel
    }

    PARAMETER
    {
        name = LandOnLaythe
        type = ReachState
        title = Land on Laythe
        targetBody = Laythe
        situation = LANDED
        disableOnStateChange = true
        hideChildren = true
    }

    PARAMETER
    {
        name = PlantFlag
        type = PlantFlag
        targetBody = Laythe
        title = Plant a flag on Laythe's surface
    }

    PARAMETER
    {
        name = CollectSurfaceSample
        type = CollectScience
        targetBody = Laythe
        situation = SrfLanded
        experiment = surfaceSample
        title = Collect a surface sample from Laythe
    }

    PARAMETER
    {
        name = ReturnHome
        type = ReturnHome
        title = Safely return the crew to Kerbin
    }
}