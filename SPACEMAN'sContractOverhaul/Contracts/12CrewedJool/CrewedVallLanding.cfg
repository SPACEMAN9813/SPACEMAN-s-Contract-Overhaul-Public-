CONTRACT_TYPE
{
    name = CrewedVallLanding
    group = SPACEMAN'sContractOverhaul

    title = Crewed Vall Landing
    agent = Kerbal Rocketry
    sortKey = 8709

    synopsis = Land Kerbals on Vall, perform surface operations, and return them safely.
    notes = After mastering other Jool operations, your agency is ready to attempt an interplanetary crewed landing.
    description = Launch a new crewed vessel to Vall, land safely, plant a flag, collect a surface sample, and return your crew safely to Kerbin.
    completedMessage = Your crew has landed on Vall and returned home safely.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Vall

    rewardScience = 30
    rewardReputation = 120
    rewardFunds = 600000

    failureFunds = -200000
    failureReputation = -80

    prestige = Exceptional

   
    REQUIREMENT
    {
        name = CompletedCrewedVallOrbiter
        type = CompleteContract
        contractType = CrewedVallOrbiter
    }


    PARAMETER
    {
        name = Crewed
        type = HasCrew
        minCrew = 1
        title = Launch a crewed interplanetary vessel
    }

    PARAMETER
    {
        name = LandOnTylo
        type = ReachState
        title = Land on Tylo
        targetBody = Tylo
        situation = LANDED
        disableOnStateChange = true
        hideChildren = true
    }

    PARAMETER
    {
        name = PlantFlag
        type = PlantFlag
        targetBody = Vall
        title = Plant a flag on Vall's surface
    }

    PARAMETER
    {
        name = CollectSurfaceSample
        type = CollectScience
        targetBody = Vall
        situation = SrfLanded
        experiment = surfaceSample
        title = Collect a surface sample from Vall
    }

    PARAMETER
    {
        name = ReturnHome
        type = ReturnHome
        title = Safely return the crew to Kerbin
    }
}