CONTRACT_TYPE
{
    name = ExtendedLaytheStay
    group = SPACEMAN'sContractOverhaul

    title = Extended Laythe Stay
    agent = Kerbal Rocketry
    sortKey = 8400

    synopsis = Keep a crewed vessel landed on Laythe for at least 300 days.
    notes = After successful landings on Laythe, mission control is ready to push the limits of long-duration interplanetary moon surface operations.
    description = Land a crewed vessel on Laythe and maintain a surface presence for at least 300 days. Conduct extended operations and return the crew safely to Kerbin.
    completedMessage = The 300-day Laythe surface mission was a success! Long-term interplanetary habitation is now within reach.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Laythe

    rewardScience = 36
    rewardReputation = 200
    rewardFunds = 1200000

    failureFunds = -400000
    failureReputation = -120

    prestige = Exceptional

    REQUIREMENT
    {
        name = CompletedCrewedLaytheLanding
        type = CompleteContract
        contractType = CrewedLaytheLanding
    }


    PARAMETER
    {
        name = Crewed
        type = HasCrew
        minCrew = 1
        title = Land a crewed interplanetary vessel on Laythe
    }

    PARAMETER
    {
        name = LandOnLaythe
        type = ReachState
        title = Land on Laythe
        targetBody = Laythe
        situation = LANDED
        disableOnStateChange = true
        hideChildren = true
    }

    PARAMETER
    {
        name = StayDuration
        type = Duration
        duration = 300d
        preWaitText = Beginning extended Laythe surface mission...
        waitingText = Maintaining long-term surface presence on Laythe...
        completionText = Surface stay completed.
        title = Remain landed on Laythe for at least 300 days
    }

    PARAMETER
    {
        name = ReturnHome
        type = ReturnHome
        title = Safely return the crew to Kerbin
    }
}