CONTRACT_TYPE
{
    name = CrewedVallOrbiter
    group = SPACEMAN'sContractOverhaul

    title = Crewed Vall Orbital Mission
    agent = Kerbal Rocketry
    sortKey = 830

    synopsis = Send Kerbals to orbit Vall and safely return them home.
    notes = Uncrewed missions have paved the way. It is now time to send Kerbals to orbit the blue cloudy planet and bring them back safely... We hope...
    description = Launch a crewed spacecraft from Kerbin, place it into stable orbit around Vall, maintain orbit for a short duration, and return the crew safely to Kerbin.
    completedMessage = Historic achievement! Your crew successfully orbited Vall and returned safely to Kerbin.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Duna

    rewardScience = 27
    rewardReputation = 80
    rewardFunds = 750000

    failureFunds = -250000
    failureReputation = -60

    prestige = Exceptional

    REQUIREMENT
    {
        name = CompletedTyloSoftLanding
        type = CompleteContract
        contractType = TyloSoftLanding
    }

    REQUIREMENT
    {
        name = CompletedLaytheSoftLanding
        type = CompleteContract
        contractType = LaytheSoftLanding
    }

    PARAMETER
    {
        name = CrewedVallMission
        type = VesselParameterGroup
        title = Complete a crewed Vall orbital mission
        define = CrewedVallMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new crewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = HasCrew
            type = HasCrew
            title = Have at least 1 Kerbal aboard
            minCrew = 1
            hideChildren = true
        }

        PARAMETER
        {
            name = OrbitVall
            type = Orbit
            targetBody = Vall
            minPeA = 42000
            maxPeA = 1225000
            minInclination = 0
            maxInclination = 180
            hideChildren = true
            disableOnStateChange = true
        }

        PARAMETER
        {
            name = MaintainOrbit
            type = Duration
            duration = 50d
            preWaitText = Crew stabilizing orbit...
            waitingText = Conducting orbital operations around Vall...
            completionText = Orbital objectives complete.
        }

        PARAMETER
        {
            name = ReturnHome
            type = ReturnHome
            title = Safely return the crew to Kerbin
        }
    }
}