CONTRACT_TYPE
{
    name = CrewedDunaLanding
    group = SPACEMAN'sContractOverhaul

    title = Crewed Duna Landing
    agent = Kerbal Rocketry
    sortKey = 2300

    synopsis = Land Kerbals on Duna, perform surface operations, and return them safely.
    notes = After mastering Munar operations, your agency is ready to attempt an interplanetary crewed landing.
    description = Launch a new crewed vessel to Duna, land safely, plant a flag, collect a surface sample, and return your crew safely to Kerbin.
    completedMessage = Your crew has landed on Duna and returned home safely.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Duna

    rewardScience = 10
    rewardReputation = 120
    rewardFunds = 600000

    failureFunds = -200000
    failureReputation = -80

    prestige = Exceptional

    REQUIREMENT
    {
        name = CompletedCrewedDunaOrbit
        type = CompleteContract
        contractType = CrewedDunaOrbiter
    }

    REQUIREMENT
    {
        name = CompletedMunarHabitation
        type = CompleteContract
        contractType = MunarHabitationExtended
    }

    PARAMETER
    {
        name = Crewed
        type = HasCrew
        minCrew = 1
        title = Launch a crewed interplanetary vessel
    }

    PARAMETER
    {
        name = LandOnDuna
        type = ReachState
        title = Land on Duna
        targetBody = Duna
        situation = LANDED
        disableOnStateChange = true
        hideChildren = true
    }

    PARAMETER
    {
        name = PlantFlag
        type = PlantFlag
        targetBody = Duna
        title = Plant a flag on Duna's surface
    }

    PARAMETER
    {
        name = CollectSurfaceSample
        type = CollectScience
        targetBody = Duna
        situation = SrfLanded
        experiment = surfaceSample
        title = Collect a surface sample from Duna
    }

    PARAMETER
    {
        name = ReturnHome
        type = ReturnHome
        title = Safely return the crew to Kerbin
    }
}