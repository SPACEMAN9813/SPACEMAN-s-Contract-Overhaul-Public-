CONTRACT_TYPE
{
    name = IkeOrbiter
    group = SPACEMAN'sContractOverhaul

    title = Ike Orbital Mission
    agent = Kerbal Rocketry
    sortKey = 812

    synopsis = Launch an uncrewed probe and enter a stable orbit around Ike.
    notes = So turns out that red dot has a moon, but to study them we need to get into orbit.
    description = Send an uncrewed probe from Kerbin to Duna and place it into a stable orbit.
    completedMessage = Outstanding! Your probe has successfully entered orbit around Duna.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Ike

    rewardScience = 4
    rewardReputation = 35
    rewardFunds = 220000

    failureFunds = -60000
    failureReputation = -25

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedDunaFlyby
        type = CompleteContract
        contractType = DunaFlyby
    }

    PARAMETER
    {
        name = IkeOrbiterMission
        type = VesselParameterGroup
        title = Complete a Ike orbital mission
        define = IkeOrbiterMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = OrbitIke
            type = Orbit
            targetBody = Ike
            minPeA = 27000
            maxPeA = 636000
            minInclination = 0
            maxInclination = 180
            hideChildren = true
        }

        PARAMETER
        {
            name = MaintainOrbit
            type = Duration
            duration = 3d
            preWaitText = Holding stable Ike orbit...
            waitingText = Maintaining Ike orbit...
            completionText = Stable orbit maintained.
        }
    }
}