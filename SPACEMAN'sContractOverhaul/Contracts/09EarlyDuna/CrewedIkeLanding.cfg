CONTRACT_TYPE
{
    name = CrewedIkeLanding
    group = SPACEMAN'sContractOverhaul

    title = Crewed Ike Landing
    agent = Kerbal Rocketry
    sortKey = 2350

    synopsis = Land Kerbals on Ike, perform surface operations, and return them safely.
    notes = With Duna orbital missions completed and a successful robotic landing on Ike, your agency is ready for a crewed landing on this moon.
    description = Launch a new crewed vessel to Ike, land safely, plant a flag, collect a surface sample, and return your crew safely to Kerbin.
    completedMessage = Your crew has landed on Ike and returned home safely.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Ike

    rewardScience = 8
    rewardReputation = 140
    rewardFunds = 750000

    failureFunds = -250000
    failureReputation = -90

    prestige = Exceptional

    REQUIREMENT
    {
        name = CompletedCrewedDunaOrbit
        type = CompleteContract
        contractType = CrewedDunaOrbiter
    }

    REQUIREMENT
    {
        name = CompletedIkeSoftLanding
        type = CompleteContract
        contractType = IkeSoftLanding
    }

    PARAMETER
    {
        name = Crewed
        type = HasCrew
        minCrew = 1
        title = Launch a crewed interplanetary vessel
    }

    PARAMETER
    {
        name = LandOnIke
        type = ReachState
        title = Land on Ike
        targetBody = Ike
        situation = LANDED
        disableOnStateChange = true
        hideChildren = true
    }

    PARAMETER
    {
        name = PlantFlag
        type = PlantFlag
        targetBody = Ike
        title = Plant a flag on Ike's surface
    }

    PARAMETER
    {
        name = CollectSurfaceSample
        type = CollectScience
        targetBody = Ike
        situation = SrfLanded
        experiment = surfaceSample
        title = Collect a surface sample from Ike
    }

    PARAMETER
    {
        name = ReturnHome
        type = ReturnHome
        title = Safely return the crew to Kerbin
    }
}