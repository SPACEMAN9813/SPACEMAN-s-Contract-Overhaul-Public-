CONTRACT_TYPE
{
    name = DunaSoftLanding
    group = SPACEMAN'sContractOverhaul

    title = Duna Soft Landing
    agent = Kerbal Rocketry
    sortKey = 820

    synopsis = Perform a controlled, uncrewed soft landing on Duna.
    notes = Orbiting Duna was only the beginning. Now we attempt a powered descent through its thin atmosphere and touch down safely on the red surface.
    description = Launch an uncrewed probe from Kerbin and perform a soft landing on Duna. Touch down intact and transmit scientific data from the surface to complete the mission.
    completedMessage = Success! Your probe has safely landed on Duna and transmitted surface data.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Duna

    rewardScience = 8
    rewardReputation = 45
    rewardFunds = 350000

    failureFunds = -90000
    failureReputation = -30

    prestige = Significant

    REQUIREMENT
    {
        name = CompletedDunaOrbit
        type = CompleteContract
        contractType = DunaOrbiter
    }

    PARAMETER
    {
        name = DunaLandingMission
        type = VesselParameterGroup
        title = Complete a Duna landing mission
        define = DunaLandingMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new uncrewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = Uncrewed
            type = HasCrew
            title = Uncrewed
            minCrew = 0
            maxCrew = 0
            hideChildren = true
        }

        PARAMETER
        {
            name = LandOnDuna
            type = ReachState
            title = Land on Duna
            targetBody = Duna
            situation = LANDED
            disableOnStateChange = true
            hideChildren = true
        }

        PARAMETER
        {
            name = TransmitData
            type = CollectScience
            recoveryMethod = TRANSMIT
            targetBody = Duna
            situation = SrfLanded
            title = Transmit any science from Duna's surface
        }
    }
}