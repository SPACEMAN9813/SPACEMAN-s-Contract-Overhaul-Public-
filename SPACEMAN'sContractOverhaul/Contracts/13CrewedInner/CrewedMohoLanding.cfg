    notes = After mastering other Moho operations, your agency is ready to attempt an interplanetary crewed landing on Moho.
    description = Launch a new crewed vessel to Moho, land safely, plant a flag, collect a surface sample, and return your crew safely to Kerbin.
    completedMessage = Your crew has landed on Moho and returned home safely.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Moho

    rewardScience = 20
    rewardReputation = 120
    rewardFunds = 600000

    failureFunds = -200000
    failureReputation = -80

    prestige = Exceptional

    REQUIREMENT
    {
        name = CompletedMohoSoftLanding
        type = CompleteContract
        contractType = MohoSoftLanding
    }

    REQUIREMENT
    {
        name = CompletedMohoSoftLanding
        type = CompleteContract
        contractType = MohoSoftLanding
    }


    PARAMETER
    {
        name = Crewed
        type = HasCrew
        minCrew = 1
        title = Launch a crewed interplanetary vessel
    }

    PARAMETER
    {
        name = LandOnMoho
        type = ReachState
        title = Land on Moho
        targetBody = Moho
        situation = LANDED
        disableOnStateChange = true
        hideChildren = true
    }

    PARAMETER
    {
        name = PlantFlag
        type = PlantFlag
        targetBody = Moho
        title = Plant a flag on Moho's surface
    }

    PARAMETER
    {
        name = CollectSurfaceSample
        type = CollectScience
        targetBody = Moho
        situation = SrfLanded
        experiment = surfaceSample
        title = Collect a surface sample from Moho
    }

    PARAMETER
    {
        name = ReturnHome
        type = ReturnHome
        title = Safely return the crew to Kerbin
    }
}