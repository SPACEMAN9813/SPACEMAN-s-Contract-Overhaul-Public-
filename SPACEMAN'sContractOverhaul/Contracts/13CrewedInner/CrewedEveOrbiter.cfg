CONTRACT_TYPE
{
    name = CrewedEveOrbiter
    group = SPACEMAN'sContractOverhaul

    title = Crewed Eve Orbital Mission
    agent = Kerbal Rocketry
    sortKey = 830

    synopsis = Send Kerbals to orbit Eve and safely return them home.
    notes = Uncrewed missions have paved the way. It is now time to send Kerbals to orbit the Purple planet and bring them back safely... We hope...
    description = Launch a crewed spacecraft from Kerbin, place it into stable orbit around Eve, maintain orbit for a short duration, and return the crew safely to Kerbin.
    completedMessage = Historic achievement! Your crew successfully orbited Eve and returned safely to Kerbin.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Eve

    rewardScience = 15
    rewardReputation = 80
    rewardFunds = 750000

    failureFunds = -250000
    failureReputation = -60

    prestige = Exceptional

    REQUIREMENT
    {
        name = CompletedEveSoftLanding
        type = CompleteContract
        contractType = EveSoftLanding
    }

    REQUIREMENT
    {
        name = CompletedKerbinStationStay
        type = CompleteContract
        contractType = KerbinStationCrewStay100
    }

    PARAMETER
    {
        name = CrewedEveMission
        type = VesselParameterGroup
        title = Complete a crewed Eve orbital mission
        define = CrewedEveMission

        PARAMETER
        {
            name = NewVessel
            type = NewVessel
            title = Launch a new crewed vessel
            hideChildren = true
        }

        PARAMETER
        {
            name = HasCrew
            type = HasCrew
            title = Have at least 1 Kerbal aboard
            minCrew = 1
            hideChildren = true
        }

        PARAMETER
        {
            name = OrbitEve
            type = Orbit
            targetBody = Eve
            minPeA = 137000
            maxPeA = 2500000
            minInclination = 0
            maxInclination = 180
            hideChildren = true
            disableOnStateChange = true
        }

        PARAMETER
        {
            name = MaintainOrbit
            type = Duration
            duration = 5d
            preWaitText = Crew stabilizing orbit...
            waitingText = Conducting orbital operations around Eve...
            completionText = Orbital objectives complete.
        }

        PARAMETER
        {
            name = ReturnHome
            type = ReturnHome
            title = Safely return the crew to Kerbin
        }
    }
}