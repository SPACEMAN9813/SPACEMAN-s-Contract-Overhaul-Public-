CONTRACT_TYPE
{
    name = CrewedEveLanding
    group = SPACEMAN'sContractOverhaul

    title = Crewed Eve Landing
    agent = Kerbal Rocketry
    sortKey = 9888

    synopsis = Land Kerbals on Eve, perform surface operations, and return them safely.
    notes = After mastering other Jool operations, your agency is ready to attempt an interplanetary crewed landing.
    description = Launch a new crewed vessel to Eve, land safely, plant a flag, collect a surface sample, and return your crew safely to Kerbin.
    completedMessage = Your crew has landed on Eve and returned home safely.

    minExpiry = 0
    maxExpiry = 0
    maxCompletions = 1

    cancellable = false
    declinable = false

    targetBody = Eve

    rewardScience = 45
    rewardReputation = 120
    rewardFunds = 600000

    failureFunds = -200000
    failureReputation = -80

    prestige = Exceptional

    REQUIREMENT
    {
        name = CompletedCrewedEveOrbiter
        type = CompleteContract
        contractType = CrewedEveOrbiter
    }

    REQUIREMENT
    {
        name = CompletedCrewedJoolOrbiter
        type = CompleteContract
        contractType = CrewedJoolOrbiter
    }


    PARAMETER
    {
        name = Crewed
        type = HasCrew
        minCrew = 1
        title = Launch a crewed interplanetary vessel
    }

    PARAMETER
    {
        name = LandOnEve
        type = ReachState
        title = Land on Eve
        targetBody = Eve
        situation = LANDED
        disableOnStateChange = true
        hideChildren = true
    }

    PARAMETER
    {
        name = PlantFlag
        type = PlantFlag
        targetBody = Eve
        title = Plant a flag on Eve's surface
    }

    PARAMETER
    {
        name = CollectSurfaceSample
        type = CollectScience
        targetBody = Eve
        situation = SrfLanded
        experiment = surfaceSample
        title = Collect a surface sample from Eve
    }

    PARAMETER
    {
        name = ReturnHome
        type = ReturnHome
        title = Safely return the crew to Kerbin
    }
}